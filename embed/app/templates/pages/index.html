{{template "layout" .}}

{{define "title"}}{{.Category}} Recipe Catalog{{end}}

{{define "content"}}
<h1 class="text-3xl font-bold mb-6 capitalize">{{.Category}} Recipes</h1>
<div class="grid md:grid-cols-3 gap-6">
    {{range .Recipes}}
    <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
        <div class="p-6">
            <h2 class="text-xl font-semibold text-gray-800">{{.Name}}</h2>
            <p class="text-gray-600 mt-2 text-sm">{{.Description}}</p>
            <div class="mt-4 flex items-center text-orange-500 font-bold text-xs uppercase tracking-wider">
                {{.Time | fmtDuration}}
            </div>
        </div>
    </div>
    {{else}}
    <p class="text-gray-500 italic">No recipes were found for this category.</p>
    {{end}}
</div>
{{end}}
